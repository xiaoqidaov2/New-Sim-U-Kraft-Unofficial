
[general]
	#是否启用方块黑名单保护
	#禁用后规划师和建筑师将可以处理所有方块
	enableBlacklistProtection = true
	#是否在日志中记录被跳过的黑名单方块
	logSkippedBlocks = true
	#是否启用调试日志（会输出更多详细信息）
	enableDebugLog = false
	#是否启用创造模式
	#开启后建筑师建造不需要材料和金钱
	#与专家模式互斥，同时开启时创造模式优先
	enableCreativeMode = false
	#是否启用专家模式
	#专家模式下建筑师需要所有材料（除了跳过列表中的）
	#普通模式下使用基础材料列表和通类匹配组
	enableExpertMode = false

[npc_leveling]
	#NPC最高等级
	#Range: 1 ~ 20
	maxLevel = 7
	#每升一级减少的工作时间（tick）
	#Range: 0 ~ 50
	speedBonusPerLevel = 5
	#NPC工作的最短时间（tick），不会被等级提升而减少
	#Range: 1 ~ 100
	minSpeedTicks = 5

[materials]
	#普通模式下是否启用材料通类匹配
	#启用后可以使用通类匹配组中的任意材料替代
	enableMaterialCategoryMatching = true
	#普通模式 - 基础材料列表
	#建筑师建造时需要的单个材料
	#格式: modid:item_name
	basicMaterials = ["minecraft:iron_block", "minecraft:gold_block", "minecraft:diamond_block", "minecraft:emerald_block", "minecraft:copper_block", "minecraft:netherite_block", "minecraft:lapis_block", "minecraft:redstone_block", "minecraft:coal_block", "minecraft:bamboo_block"]
