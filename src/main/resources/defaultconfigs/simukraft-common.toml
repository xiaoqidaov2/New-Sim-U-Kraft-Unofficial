[planning]
	#规划师无法处理的方块黑名单（拆除/替换/填充）
	#格式: modid:block_name
	#默认包含基岩、命令方块、屏障等保护方块，以及本模组的所有控制盒和建筑盒
	blockBlacklist = ["minecraft:bedrock", "minecraft:command_block", "minecraft:chain_command_block", "minecraft:repeating_command_block", "minecraft:barrier", "minecraft:structure_block", "minecraft:structure_void", "minecraft:jigsaw", "simukraft:build_box", "simukraft:city_core", "simukraft:residential_control_box", "simukraft:commercial_control_box", "simukraft:industrial_control_box", "simukraft:other_control_box", "simukraft:wool_farm_control_box", "simukraft:building_material_store_control_box", "simukraft:beef_farm_control_box", "simukraft:nsuk_meat_shop_control_box", "simukraft:nsuk_farmland_box", "simukraft:fruit_shop_control_box", "simukraft:bakery_control_box"]
	#规划师基础拆除速度（tick/方块），等级1的速度
	#Range: 5 ~ 200
	removeSpeedBase = 40
	#规划师基础替换速度（tick/方块）
	#Range: 5 ~ 200
	replaceSpeedBase = 40
	#规划师基础填充速度（tick/方块）
	#Range: 5 ~ 200
	fillSpeedBase = 40
	#拆除方块时是否掉落物品
	dropItemsOnRemove = true
	#是否将拆除/替换获得的物品存入附近箱子
	#如果关闭，物品将掉落在地上
	storeItemsInChest = true
	#搜索箱子的范围（格）
	#Range: 1 ~ 20
	chestSearchRange = 3
	#材料不足警告的冷却时间（秒）
	#Range: 1 ~ 300
	warningCooldownSeconds = 20
	#休息状态检查间隔（tick，20tick=1秒）
	#Range: 1 ~ 200
	restCheckInterval = 100
	#规划师是否获得经验
	enableXpGain = true
	#每处理一个方块获得的经验值
	#Range: 0 ~ 100
	xpPerBlock = 1

[construction]
	#建筑师无法处理的方块黑名单（建造时跳过）
	#格式: modid:block_name
	#默认包含基岩、命令方块、屏障等保护方块，以及本模组的所有控制盒和建筑盒
	blockBlacklist = ["minecraft:bedrock", "minecraft:command_block", "minecraft:chain_command_block", "minecraft:repeating_command_block", "minecraft:barrier", "minecraft:structure_block", "minecraft:structure_void", "minecraft:jigsaw", "simukraft:build_box", "simukraft:city_core", "simukraft:residential_control_box", "simukraft:commercial_control_box", "simukraft:industrial_control_box", "simukraft:other_control_box", "simukraft:wool_farm_control_box", "simukraft:building_material_store_control_box", "simukraft:beef_farm_control_box", "simukraft:nsuk_meat_shop_control_box", "simukraft:nsuk_farmland_box", "simukraft:fruit_shop_control_box", "simukraft:bakery_control_box"]
	#建筑师基础放置速度（tick/方块）
	#Range: 1 ~ 200
	placeSpeedBase = 40
	#建筑师搜索材料的箱子范围（格）
	#Range: 1 ~ 20
	chestSearchRange = 3
	#材料不足警告的冷却时间（秒）
	#Range: 1 ~ 300
	warningCooldownSeconds = 20
	#建筑师是否获得经验
	enableXpGain = true
	#每放置一个方块获得的经验值
	#Range: 0 ~ 100
	xpPerBlock = 1
	#建筑师工作时是否强制加载周围区块
	#关闭后建筑师可能在区块未加载时停止工作
	forceLoadChunks = true
	#建筑师工作时强制加载区块的半径
	#Range: 1 ~ 5
	chunkLoadRadius = 1
	#建筑师等待区块加载的最大tick数
	#重启游戏后区块可能需要时间加载，此值决定最大等待时间
	#Range: 10 ~ 200
	chunkLoadWaitTicks = 60

[farmland]
	#农民是否启用作物加速生长
	#关闭后作物将以正常速度生长
	enableCropGrowthBoost = true

[integration]
	#Whether to enable Open Parties And Claims chunk claiming integration
	#When enabled, city chunks will be automatically claimed via OPAC using the mayor's player UUID
	enableOpacClaims = true

